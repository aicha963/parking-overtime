<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Dépassement</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #ececec; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h1 { color: #d32f2f; }
        .price { font-size: 24px; font-weight: bold; margin: 20px 0; color: #333; }
        button { background: #4CAF50; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #45a049; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="box">
        <h1>🅿️ SMART PARKING</h1>
        <p>Votre temps est écoulé.</p>
        <div class="price" id="montant">Calcul...</div>
        <button onclick="validerPaiement()">PAYER & SORTIR</button>
    </div>

    <script>
        // Récupère le montant depuis l'URL
        const params = new URLSearchParams(window.location.search);
        const amount = params.get('amount') || "10";
        document.getElementById('montant').innerText = "À payer : " + amount + " DT";

        function validerPaiement() {
            const token = "Al3eurLGTUbjWPAefx1mLEk_qoUaD7nc";
            // L'API Blynk qui repasse V36 à 1
            const url = `https://blynk.cloud/external/api/update?token=${token}&V36=1`;

            fetch(url).then(res => {
                alert("Paiement validé ! La barrière va s'ouvrir.");
            }).catch(err => alert("Erreur de connexion"));
        }
    </script>
</body>
</html>
