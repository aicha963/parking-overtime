<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Sécurisé - Smart Parking</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h1 { color: #1a73e8; font-size: 24px; margin-bottom: 10px; }
        .price { font-size: 28px; font-weight: bold; margin: 20px 0; color: #d32f2f; background: #fff5f5; padding: 10px; border-radius: 10px; }
        
        /* Style du Formulaire */
        .card-form { text-align: left; margin-top: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: #666; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 10px; }
        
        button { background: #4CAF50; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; font-weight: bold; }
        button:hover { background: #388E3C; }
        .footer-icons { margin-top: 20px; opacity: 0.6; font-size: 12px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🅿️ SMART PARKING</h1>
        <p>Temps dépassé - Paiement requis</p>
        
        <div class="price" id="montant">Calcul...</div>

        <div class="card-form">
            <div class="input-group">
                <label>Nom sur la carte</label>
                <input type="text" id="cardName" placeholder="Ex: Aicha Ben Salah" required>
            </div>
            <div class="input-group">
                <label>Numéro de carte</label>
                <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="16" required>
            </div>
            <div class="row">
                <div class="input-group" style="flex: 2;">
                    <label>Expiration</label>
                    <input type="text" id="exp" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>CVV</label>
                    <input type="password" id="cvv" placeholder="123" maxlength="3" required>
                </div>
            </div>
            <button onclick="validerPaiement()">CONFIRMER LE PAIEMENT</button>
        </div>

        <div class="footer-icons">
            🔒 Paiement sécurisé SSL <br>
            Visa • Mastercard • Edinar
        </div>
    </div>

    <script>
        // 1. Récupération du montant depuis l'URL (votre code ESP32 envoie &amount=X)
        const params = new URLSearchParams(window.location.search);
        const amount = params.get('amount') || "1.0"; 
        document.getElementById('montant').innerText = amount + " DT";

        function validerPaiement() {
            // Récupération des champs
            const name = document.getElementById('cardName').value;
            const number = document.getElementById('cardNumber').value;
            const exp = document.getElementById('exp').value;
            const cvv = document.getElementById('cvv').value;

            // 2. Vérification simple des champs
            if (name === "" || number.length < 16 || exp === "" || cvv.length < 3) {
                alert("Veuillez remplir correctement les coordonnées de la carte.");
                return;
            }

            // 3. Simulation de traitement (petit délai pour faire "vrai")
            document.querySelector('button').innerText = "Traitement...";
            document.querySelector('button').disabled = true;

            const token = "8hzUryHKFAKyz2UAkxqUByAcAsqcFQXa";
            const url = `https://blynk.cloud/external/api/update?token=${token}&V36=1`;

            // 4. Envoi vers Blynk après 1.5 seconde
            setTimeout(() => {
                fetch(url).then(res => {
                    alert("Paiement de " + amount + " DT effectué avec succès ! La barrière va s'ouvrir.");
                    // Optionnel : redirection vers une page de remerciement
                    window.location.href = "https://blynk.io/"; 
                }).catch(err => {
                    alert("Erreur de connexion au serveur de paiement.");
                    document.querySelector('button').innerText = "CONFIRMER LE PAIEMENT";
                    document.querySelector('button').disabled = false;
                });
            }, 1500);
        }
    </script>

</body>
</html>
